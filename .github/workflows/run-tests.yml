name: Node.js CI

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Check code style
        run: npm run lint

  audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install production dependencies
        run: npm ci --omit=dev --ignore-scripts
      - name: Check npm audit
        run: npm audit --omit=dev --audit-level=low

  docs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Install Compodoc
        run: npm i -g @compodoc/compodoc
      - name: Generate docs and check coverage
        run: npm run doc

  build-and-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Build Project
        run: npm run build
      - name: Test Package Install
        run: |
          npm version "5.0.0" --no-git-tag-version
          npm pack
          npm install -g ./sasjs-cli-5.0.0.tgz
          sasjs v
      - name: Run smoke tests
        run: sh ./test.sh

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Install Doxygen
        run: sudo apt-get install -y doxygen
      - name: Build Project
        run: npm run build
      - name: Install sasjs CLI globally
        run: |
          npm version "5.0.0" --no-git-tag-version
          npm pack
          npm install -g ./sasjs-cli-5.0.0.tgz
      - name: Generate coverage report
        uses: artiomtr/jest-coverage-report-action@v2.0-rc.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          test-script: npx jest --config=jest.config.js --silent --runInBand --ci --coverage --testLocationInResults --json --outputFile="report.json"

  server-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Install Doxygen
        run: sudo apt-get install -y doxygen
      - name: Build Project
        run: npm run build
      - name: Create .env file for sasjs/server
        run: |
          echo "RUN_TIMES=js" >> .env
          echo "NODE_PATH=node" >> .env
          echo "MOCK_SERVERTYPE=sas9" >> .env
      - name: Download sasjs/server package
        run: curl -L https://github.com/sasjs/server/releases/latest/download/linux.zip -o linux.zip
      - name: Unzip and start server
        run: |
          unzip linux.zip
          npx pm2 start api-linux
      - name: Install sasjs CLI globally
        run: |
          npm version "5.0.0" --no-git-tag-version
          npm pack
          npm install -g ./sasjs-cli-5.0.0.tgz
      - name: Deploy SAS9 tests
        run: |
          cd mocks
          sasjs cbd
          cd ..
          ls sasjs_root -R
      - name: Run server tests
        run: npm run test:server
        env:
          CI: true
          CLIENT: ${{ secrets.CLIENT }}
          SECRET: ${{ secrets.SECRET }}
          SAS_USERNAME: ${{ secrets.SAS_USERNAME }}
          SAS_PASSWORD: ${{ secrets.SAS_PASSWORD }}
          VIYA_SERVER_URL: ${{ secrets.VIYA_SERVER_URL }}
          SAS9_SERVER_URL: http://localhost:5000
          SASJS_SERVER_URL: http://localhost:5000
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
